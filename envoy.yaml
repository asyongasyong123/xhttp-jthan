static_resources:
  listeners:
  - name: listener_0
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8080
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          stream_idle_timeout: 3600s
          route_config:
            name: local_route
            virtual_hosts:
            - name: main
              domains: ["*"]
              routes:
              - match:
                  path:
                    exact: "/"
                direct_response:
                  status: 200
                  body:
                    inline_string: "✅ TM Freenet OK"
              - match:
                  path:
                    prefix: "/tr-tmfreenet"
                route:
                  cluster: xray_trojan
                  timeout: 3600s
                  upgrade_configs:
                  - upgrade_type: websocket
          http_filters:
          - name: envoy.filters.http.router
  clusters:
  - name: xray_trojan
    connect_timeout: 1s
    type: STATIC
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: xray_trojan
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: "127.0.0.1"
                port_value: 10000
